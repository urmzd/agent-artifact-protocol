<div id="pricing-page">
  <aap:target id="integrations">

      <h2>Integrations</h2>
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; text-align: center;">
        <div style="padding: 20px; border: 1px solid #ddd; border-radius: 8px;">Logo 1<br>Name</div>
        <div style="padding: 20px; border: 1px solid #ddd; border-radius: 8px;">Logo 2<br>Name</div>

        <div style="padding: 20px; border: 1px solid #ddd; border-radius: 8px;">Logo 6<br>Name</div>
        <div style="padding: 20px; border: 1px solid #ddd; border-radius: 8px;">Logo 7<br>Name</div>
        <div style="padding: 20px; border: 1px solid #ddd; border-radius: 8px;">Logo 8<br>Name</div>
      </div>
    </section>
  </aap:target>
  <aap:target id="pricing-tiers">
    <div style="max-width: 1100px; margin: auto; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
      <div style="flex: 1; min-width: 200px; background: white; padding: 30px; border-radius: 8px; border: 1px solid #ddd;">
        <h3>Free</h3>
        <p style="font-size: 2rem; font-weight: bold;"><aap:target id="price-free">$0</aap:target></p>
        <p>For individuals.</p>
      </div>
      <div style="flex: 1; min-width: 200px; background: white; padding: 30px; border-radius: 8px; border: 1px solid #ddd;">
        <h3>Starter</h3>
        <p style="font-size: 2rem; font-weight: bold;"><aap:target id="price-starter">$19</aap:target></p>
        <p>For professionals.</p>
      </div>
      <div style="flex: 1; min-width: 200px; background: #764ba2; color: white; padding: 30px; border-radius: 8px;">
        <h3>Pro</h3>
        <p style="font-size: 2rem; font-weight: bold;"><aap:target id="price-pro">$49</aap:target></p>
        <p>For growing teams.</p>
      </div>
      <div style="flex: 1; min-width: 200px; background: white; padding: 30px; border-radius: 8px; border: 1px solid #ddd;">
        <h3>Enterprise</h3>
        <p style="font-size: 2rem; font-weight: bold;"><aap:target id="price-enterprise">Custom</aap:target></p>
        <p>For large organizations.</p>
      </div>
    </div>
  </aap:target>
