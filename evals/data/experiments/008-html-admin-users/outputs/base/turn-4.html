<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Management Dashboard</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; color: #333; }
    .container { padding: 20px; max-width: 1200px; margin: auto; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .toolbar-left { display: flex; gap: 10px; align-items: center; }
    .filter-bar { display: flex; gap: 10px; background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e0e0e0; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    th { background: #f8f9fa; padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; }
    td { padding: 12px 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 10px; vertical-align: middle; }
    
    /* Updated Badge Styling */
    .badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-suspended { background: #fee2e2; color: #991b1b; }
    .badge-inactive { background: #f3f4f6; color: #374151; }
    
    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    button { padding: 8px 16px; border-radius: 4px; border: 1px solid #ccc; background: #fff; cursor: pointer; transition: 0.2s; }
    button:hover { background: #f0f0f0; }
    button.primary { background: #007bff; color: white; border: none; }
    button.primary:hover { background: #0056b3; }
    button.secondary { background: #6c757d; color: white; border: none; }
    select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <div class="toolbar-left">
            <button class="primary">+ Add User</button>
            <select>
                <option>Bulk Actions</option>
                <option>Deactivate Selected</option>
                <option>Delete Selected</option>
            </select>
            <button class="secondary">Export CSV</button>
        </div>
        <input type="text" placeholder="Search users...">
    </div>

    <div class="filter-bar">
        <select><option>All Roles</option></select>
        <select><option>All Departments</option></select>
        <select><option>All Status</option></select>
        <input type="date">
    </div>

    <table>
        <thead>
            <tr>
                <th><input type="checkbox"></th>
                <th>User</th>
                <th>Email</th>
                <th>Role</th>
                <th>Department</th>
                <th>Status</th>
                <th>Last Login</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
    </table>

    <div class="pagination">
        <span>Showing 1-105 of 105 users</span>
        <div>
            <select><option>25 per page</option><option>50 per page</option></select>
            <button>&lt;</button> <button>1</button> <button>2</button> <button>3</button> <button>4</button> <button>&gt;</button>
        </div>
    </div>
</div>

<script>
    const tbody = document.getElementById('userTableBody');
    const roles = ['Admin', 'Editor', 'Viewer'];
    const departments = ['Engineering', 'Marketing', 'Sales', 'HR', 'Design', 'Finance'];
    const statuses = ['Active', 'Suspended', 'Inactive'];
    
    for (let i = 1; i <= 105; i++) {
        const row = document.createElement('tr');
        const status = statuses[Math.floor(Math.random() * statuses.length)];
        const dept = departments[Math.floor(Math.random() * departments.length)];
        const role = roles[Math.floor(Math.random() * roles.length)];
        
        let badgeClass = '';
        if (status === 'Active') badgeClass = 'badge-active';
        else if (status === 'Suspended') badgeClass = 'badge-suspended';
        else badgeClass = 'badge-inactive';
        
        row.innerHTML = `
            <td><input type="checkbox"></td>
            <td><span class="avatar"></span> User ${i}</td>
            <td>user${i}@corporate.com</td>
            <td>${role}</td>
            <td>${dept}</td>
            <td><span class="badge ${badgeClass}">${status}</span></td>
            <td>2023-10-${(i % 28) + 1}</td>
            <td><select><option>View</option><option>Edit</option><option>Delete</option></select></td>
        `;
        tbody.appendChild(row);
    }
</script>
</body>
</html>
