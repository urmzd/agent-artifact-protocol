<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Management Dashboard</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; color: #333; }
    .container { padding: 20px; max-width: 1200px; margin: auto; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .filter-bar { display: flex; gap: 10px; background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e0e0e0; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    th { background: #f8f9fa; padding: 15px; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; }
    td { padding: 12px 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #ddd; display: inline-block; margin-right: 10px; vertical-align: middle; }
    .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-inactive { background: #f8d7da; color: #721c24; }
    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    button { padding: 8px 16px; border-radius: 4px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    button.primary { background: #007bff; color: white; border: none; }
    select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <div>
            <button class="primary">+ Add User</button>
            <select><option>Bulk Actions</option><option>Delete Selected</option></select>
        </div>
        <input type="text" placeholder="Search users...">
    </div>

    <div class="filter-bar">
        <select><option>All Roles</option><option>Admin</option><option>Editor</option></select>
        <select><option>All Status</option><option>Active</option><option>Inactive</option></select>
        <input type="date">
    </div>

    <table>
        <thead>
            <tr>
                <th><input type="checkbox"></th>
                <th>User</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Last Login</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- Rows injected by script -->
        </tbody>
    </table>

    <div class="pagination">
        <span>Showing 1-10 of 85 users</span>
        <div>
            <select><option>10 per page</option><option>25 per page</option></select>
            <button>&lt;</button> <button>1</button> <button>2</button> <button>3</button> <button>&gt;</button>
        </div>
    </div>
</div>

<script>
    const tbody = document.getElementById('userTableBody');
    const roles = ['Admin', 'Editor', 'Subscriber'];
    const statuses = ['Active', 'Inactive'];
    
    for (let i = 1; i <= 85; i++) {
        const row = document.createElement('tr');
        const status = statuses[Math.floor(Math.random() * statuses.length)];
        row.innerHTML = `
            <td><input type="checkbox"></td>
            <td><span class="avatar"></span> User ${i}</td>
            <td>user${i}@example.com</td>
            <td>${roles[Math.floor(Math.random() * roles.length)]}</td>
            <td><span class="badge ${status === 'Active' ? 'badge-active' : 'badge-inactive'}">${status}</span></td>
            <td>2023-10-${(i % 28) + 1}</td>
            <td><select><option>Edit</option><option>Delete</option></select></td>
        `;
        tbody.appendChild(row);
    }
</script>
</body>
</html>
