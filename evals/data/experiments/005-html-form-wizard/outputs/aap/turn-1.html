<style>
    body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
    .wizard { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
    .step { display: none; }
    .step.active { display: block; }
    .progress-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .progress-step { height: 10px; width: 23%; background: #ddd; border-radius: 5px; }
    .progress-step.active { background: #3498db; }
    input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; background: #3498db; color: white; }
    button:disabled { background: #ccc; }
    .btn-group { margin-top: 20px; display: flex; justify-content: space-between; }
</style>

<aap:target id="wizard-container">
    <div class="wizard">
        <div class="progress-bar">
            <div class="progress-step active" id="p1"></div>
            <div class="progress-step" id="p2"></div>
            <div class="progress-step" id="p3"></div>
            <div class="progress-step" id="p4"></div>
        </div>

        <form id="regForm">
            <aap:target id="step-1" class="step active">
                <h3>Personal Info</h3>
                <input type="text" placeholder="Full Name" id="name" required>
                <input type="email" placeholder="Email" id="email" required>
                <input type="tel" placeholder="Phone" id="phone" required>
                <input type="date" id="dob" required>
            </aap:target>

            <aap:target id="step-2" class="step">
                <h3>Address</h3>
                <input type="text" placeholder="Street" id="street">
                <input type="text" placeholder="City" id="city">
                <input type="text" placeholder="State" id="state">
                <input type="text" placeholder="Zip" id="zip">
                <select id="country">
                    <option value="US">USA</option>
                    <option value="CA">Canada</option>
                </select>
            </aap:target>

            <aap:target id="step-3" class="step">
                <h3>Payment</h3>
                <input type="text" placeholder="Card Number" id="card">
                <input type="text" placeholder="MM/YY" id="expiry">
                <input type="text" placeholder="CVV" id="cvv">
                <label><input type="checkbox" id="billingMatch"> Billing same as address</label>
            </aap:target>

            <aap:target id="step-4" class="step">
                <h3>Review</h3>
                <div id="summary"></div>
            </aap:target>

            <div class="btn-group">
                <button type="button" id="prevBtn" onclick="changeStep(-1)" disabled>Previous</button>
                <button type="button" id="nextBtn" onclick="changeStep(1)">Next</button>
            </div>
        </form>
    </div>
</aap:target>

<script>
    let currentStep = 0;
    const steps = document.querySelectorAll(".step");
    const progress = document.querySelectorAll(".progress-step");

    function changeStep(n) {
        steps[currentStep].classList.remove("active");
        progress[currentStep].classList.remove("active");
        currentStep += n;
        
        if (currentStep >= steps.length) {
            alert("Submitted!");
            return;
        }

        steps[currentStep].classList.add("active");
        progress[currentStep].classList.add("active");
        
        document.getElementById("prevBtn").disabled = (currentStep === 0);
        document.getElementById("nextBtn").innerText = (currentStep === steps.length - 1) ? "Submit" : "Next";

        if (currentStep === 3) updateSummary();
    }

    function updateSummary() {
        const summary = `
            <p><strong>Name:</strong> ${document.getElementById('name').value}</p>
            <p><strong>Email:</strong> ${document.getElementById('email').value}</p>
            <p><strong>Address:</strong> ${document.getElementById('city').value}</p>
        `;
        document.getElementById("summary").innerHTML = summary;
    }
</script>
